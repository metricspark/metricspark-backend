<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MetricSpark | Milner Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(-45deg,#0b1f4a,#122b63,#1d3f8a,#0b1f4a);
background-size:400% 400%;
animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

.container{
width:420px;
padding:40px;
border-radius:20px;
background: rgba(255,255,255,0.1);
backdrop-filter: blur(18px);
box-shadow: 0 30px 80px rgba(0,0,0,0.5);
text-align:center;
color:white;
}

.logo-wrap{
perspective:1000px;
margin-bottom:15px;
}

.logo{
width:350px;
display:block;
margin:auto;
transition: transform 0.2s ease;
transform-style: preserve-3d;
}

.logo-wrap::after{
content:"";
position:absolute;
width:200%;
height:200%;
top:-50%;
left:-50%;
background: linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.4),transparent 60%);
transform: rotate(25deg);
opacity:0;
pointer-events:none;
}

.logo-wrap:hover::after{
animation: shine 1s ease;
opacity:1;
}

@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

.brand{
font-size:36px;
font-weight:700;
margin-bottom:10px;
}

.tagline{
font-size:12px;
letter-spacing:2px;
margin-bottom:20px;
color:#cfe2ff;
}

.tabs{
display:flex;
gap:12px;
margin-bottom:15px;
}

.tabs button{
flex:1;
height:50px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.15);
color:white;
cursor:pointer;
font-weight:500;
}

input, .main-btn{
width:100%;
height:50px;
padding:0 16px;
border-radius:12px;
border:none;
background:rgba(255,255,255,0.15);
color:white;
margin-bottom:14px;
font-size:15px;
}

input:focus{
outline:none;
background:rgba(255,255,255,0.25);
}

.main-btn{
background: linear-gradient(90deg,#2d63d3,#5a8dff);
cursor:pointer;
font-weight:600;
}

a{
display:block;
margin-top:10px;
color:#8ec5ff;
cursor:pointer;
}

#errorMessage {
color: #ff6b6b;
margin-top: 10px;
font-size: 14px;
display: none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-wrap">
<img src="assets/logo-icon.png" class="logo" onerror="this.src='logo-icon.png'">
</div>

<div class="brand">MetricSpark</div>
<div class="tagline">MILNER PORTAL LOGIN</div>

<div class="tabs">
<button id="loginTab">Sign In</button>
<button id="signupTab">Sign Up</button>
</div>

<input id="email" type="email" placeholder="Email (@itbd.net)">
<input id="password" type="password" placeholder="Password">

<button id="loginBtn" class="main-btn">Sign In</button>

<a id="forgotPassword">Forgot Password?</a>
<div id="errorMessage"></div>

</div>

<!-- Firebase SDKs using Milner's UtilizationTracker config -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyCOwKXnOXAw_hl3ZTYjtPnMJG_TiSHm8rY",
authDomain: "utilizationtracker.firebaseapp.com",
projectId: "utilizationtracker",
storageBucket: "utilizationtracker.firebasestorage.app",
messagingSenderId: "67928414030",
appId: "1:67928414030:web:2cae8e72eeb146820b701f",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBtn = document.getElementById("loginBtn");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const errorBox = document.getElementById("errorMessage");

const signupTab = document.getElementById("signupTab");
const loginTab = document.getElementById("loginTab");
const forgotPassword = document.getElementById("forgotPassword");

let isSignUp = false;
let isRedirecting = false;

function showError(msg) {
errorBox.style.display = "block";
errorBox.textContent = msg;
}
function hideError() {
errorBox.style.display = "none";
errorBox.textContent = "";
}
function validateDomain(email) {
return email.toLowerCase().endsWith("@itbd.net");
}

/* TAB SWITCH */
loginTab.onclick = () => {
isSignUp = false;
loginBtn.textContent = "Sign In";
};

signupTab.onclick = () => {
isSignUp = true;
loginBtn.textContent = "Sign Up";
};

// --- ROLE REDIRECT LOGIC ---
async function redirectByRole(user) {
try {
  if (!user) return;
  const ref = doc(db, "users", user.uid);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    const role = (snap.data().role || "engineer").toString().toLowerCase();
    if (role === "manager") {
      window.location.href = "milner-portal.html";
    } else {
      window.location.href = "milner/timesheet.html";
    }
  } else {
    // create default engineer doc and redirect
    await setDoc(ref, {
      role: "engineer",
      email: user.email || "",
      createdAt: Date.now()
    });
    window.location.href = "milner/timesheet.html";
  }
} catch (err) {
  console.error("Redirect error:", err);
  showError("Unable to determine role. Try again.");
}
}

// ensure any already-signed-in user is routed correctly on page load
onAuthStateChanged(auth, (user) => {
if (user && !isRedirecting) {
  redirectByRole(user);
} else {
  hideError();
}
});

/* LOGIN / SIGNUP */
loginBtn.onclick = async () => {
hideError();
const email = emailInput.value.trim().toLowerCase();
const password = passwordInput.value;

if (!email || !password) {
  showError("Enter email and password");
  return;
}

if (!validateDomain(email)) {
  showError("Please use your ITBD login (@itbd.net).");
  return;
}

loginBtn.textContent = "Processing...";
loginBtn.disabled = true;

try {
  if (isSignUp) {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, "users", cred.user.uid), {
      role: "engineer",
      email: email,
      createdAt: Date.now()
    });
    isRedirecting = true;
    await redirectByRole(cred.user);
  } else {
    const cred = await signInWithEmailAndPassword(auth, email, password);
    isRedirecting = true;
    await redirectByRole(cred.user);
  }
} catch (err) {
  console.error(err);
  let msg = "Something went wrong. Please try again.";
  if (err.code === "auth/user-not-found" || err.code === "auth/invalid-credential")
    msg = "Invalid login details.";
  else if (err.code === "auth/wrong-password")
    msg = "Incorrect password.";
  else if (err.code === "auth/email-already-in-use")
    msg = "Email already in use.";
  else if (err.code === "auth/weak-password")
    msg = "Password is too weak.";
  
  showError(msg);
}

loginBtn.textContent = isSignUp ? "Sign Up" : "Sign In";
loginBtn.disabled = false;
};

passwordInput.addEventListener('keypress', (e) => {
if (e.key === 'Enter') loginBtn.click();
});
emailInput.addEventListener('keypress', (e) => {
if (e.key === 'Enter') loginBtn.click();
});

/* RESET PASSWORD */
forgotPassword.onclick = async () => {
hideError();
const email = emailInput.value.trim().toLowerCase();
if (!validateDomain(email)) {
  showError("Please enter your @itbd.net email first.");
  return;
}
try {
  await sendPasswordResetEmail(auth, email);
  showError("Reset email sent! Please check your inbox.");
  errorBox.style.color = "#a7f3d0"; // Success color
} catch (err) {
  console.error(err);
  showError("Could not send reset email. Please try again.");
  errorBox.style.color = "#ff6b6b";
}
};
</script>

</body>
</html>
