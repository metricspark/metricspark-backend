
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Welcome – Utilization Tracker</title>
<link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #0b5cff, #6aa7ff);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
    }

    .card {
      background: rgba(255, 255, 255, 0.18);
      padding: 40px 50px;
      border-radius: 16px;
      text-align: center;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      max-width: 520px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    img.logo {
      width: 170px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      font-weight: 700;
    }

    p {
      font-size: 18px;
      margin: 10px 0 30px;
    }

    .btn {
      background: #ffffff;
      color: #0b5cff;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: 0.2s;
      min-width: 160px;
    }

    .btn:hover {
      background: #e9e9e9;
    }
  </style>
<script>if(window.self !== window.top) { document.write('<style>.sidebar{display:none !important;} .app{flex-direction:column;} .main{margin-left:0 !important; padding:15px !important;}</style>'); }</script></head>

<body>
  <div class="card">
    <img src="ITBDLOGO.webp" alt="IT By Design Logo" class="logo">
    <h1>Welcome to Utilization Tracker</h1>
    <p>Track daily performance, improve productivity, and simplify reporting.</p>

    <button class="btn" onclick="window.location.href='login.html'">Sign In →</button>
  </div>
</body>
</html>
