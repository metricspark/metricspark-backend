<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MetricSpark | Milner Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            background: #0a0f1d;
            color: #e2e8f0;
            min-height: 100vh;
            overflow: hidden; /* prevent body scroll, iframe will handle scroll */
        }

        /* ===== Primary Sidebar ===== */
        .primary-sidebar {
            width: 70px;
            background: #080c17;
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            position: fixed;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 60;
        }

        .primary-sidebar .nav-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
            color: #00f0ff;
            transition: all 0.3s ease;
        }

        .primary-sidebar .nav-icon:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .primary-sidebar .nav-icon.active {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 240px;
            background: #0f1523;
            border-right: none;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            position: fixed;
            height: 100%;
            left: 70px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .team-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 15px;
            padding: 0 10px;
            font-weight: 600;
        }

        .client-header {
            padding: 10px 16px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .client-header:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .client-header.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-left: 3px solid #00f0ff;
        }

        .logout-btn {
            margin-top: auto;
            color: #ef4444;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== Main Content Area ===== */
        .main-content {
            margin-left: 310px;
            padding: 20px;
            width: calc(100% - 310px);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .iframe-container {
            flex: 1;
            background: #f3f7fb; /* Milner dashboard background color */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

    </style>
</head>
<body>

<!-- ===== Primary Sidebar ===== -->
<div class="primary-sidebar">
    <div class="nav-icon active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect></svg>
    </div>
    <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
    </div>
    <div class="nav-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </div>
</div>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <div class="logo">
        <img src="assets/logo-icon.png" onerror="this.src='logo-icon.png'" alt="Logo" style="width: 32px; height: 32px; object-fit: contain;"> 
        MetricSpark
    </div>

    <div class="team-title">Milner Portal</div>
    
    <div id="sidebarMenu">
        <div class="client-header active" onclick="loadPage('milner/updated.html', this, 'Team Dashboard')">
            <span>📊 Dashboard</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/teammembers.html', this, 'Team Members')">
            <span>👥 Team Members</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/reports.html', this, 'Team Performance')">
            <span>📈 Team Performance</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/attendance.html', this, 'Attendance')">
            <span>📅 Attendance</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/clientreporting.html', this, 'Client Wise Reporting')">
            <span>🏢 Client Wise</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/attrition.html', this, 'Attrition')">
            <span>📉 Attrition</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/billing.html', this, 'Billing')">
            <span>💰 Billing</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/levelups.html', this, 'Level Ups')">
            <span>🎯 Level Ups</span>
        </div>
        <div class="client-header" onclick="loadPage('milner/ai-chat.html', this, 'AI Chat')">
            <span>🤖 AI Chat</span>
        </div>
    </div>
    
    <div class="logout-btn" id="logoutBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
    </div>
</div>

<!-- ===== Main Content ===== -->
<div class="main-content">
    <div class="top-bar">
        <h1 class="title" id="pageTitle">Team Dashboard</h1>
    </div>

    <div class="iframe-container">
        <iframe id="portalFrame" src="milner/updated.html" title="Portal Content"></iframe>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
    
    // Using UtilizationTracker config to match Milner logic
    const firebaseConfig = {
        apiKey: "AIzaSyCOwKXnOXAw_hl3ZTYjtPnMJG_TiSHm8rY",
        authDomain: "utilizationtracker.firebaseapp.com",
        projectId: "utilizationtracker",
        storageBucket: "utilizationtracker.firebasestorage.app",
        messagingSenderId: "67928414030",
        appId: "1:67928414030:web:2cae8e72eeb146820b701f",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "milner-login.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut(auth);
        window.location.href = "milner-login.html";
    });
</script>

<script>
    function loadPage(url, el, title) {
        document.getElementById('portalFrame').src = url;
        document.getElementById('pageTitle').textContent = title;
        
        document.querySelectorAll('.client-header').forEach(item => {
            item.classList.remove('active');
        });
        el.classList.add('active');
    }
</script>

</body>
</html>
