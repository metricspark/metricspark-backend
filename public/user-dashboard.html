<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter','Segoe UI',sans-serif;
background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background: rgba(0,0,0,0.35);
color:white;
}

.header-right{
display:flex;
gap:10px;
align-items:center;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.logout-btn{background:#ef4444;color:white;}
.export-btn{background:#10b981;color:white;}

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
padding:24px;
}

.card{
background:white;
padding:24px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.full{grid-column:span 2;}

input, select{
height:48px;
padding:0 14px;
border-radius:12px;
border:1px solid #e5e7eb;
background:#f9fafb;
}

.save-btn{
width:100%;
height:48px;
background:#2563eb;
color:white;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
MetricSpark Dashboard
<div class="header-right">
<span id="userEmail"></span>
<button class="export-btn" id="exportBtn">Export</button>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>
</div>

<div class="main">

<div class="card">
<h3>Daily Work Entry</h3>

<div class="form-grid">

<input type="date" id="date">

<select id="engineerName">
<option value="">Select Engineer</option>
<option>Tianna</option>
<option>Kundan</option>
<option>Valor</option>
<option>Aman</option>
<option>Dexter</option>
<option>Junaid</option>
<option>Maxwell</option>
<option>Palak</option>
<option>Verney</option>
</select>

<select id="status">
<option value="">Status</option>
<option>Working</option>
<option>PTO</option>
<option>Week Off</option>
</select>

<select id="manager">
<option value="">Manager</option>
<option>Aman Thakur</option>
<option>Akhilesh</option>
<option>Kip</option>
<option>Ash</option>
<option>Amit</option>
</select>

<input type="number" id="billable" placeholder="Billable">
<input type="number" id="nonbillable" placeholder="Non Billable">

<input type="number" id="tickets" placeholder="Tickets">
<input type="number" id="closed" placeholder="Closed">

<input type="number" id="escalated" placeholder="Escalated">
<input type="number" id="waiting" placeholder="Waiting">

<input type="number" id="scheduled" placeholder="Scheduled">
<div></div>

<input type="text" id="comment" placeholder="Comment" class="full">

<button class="save-btn full" id="saveBtn">Save Entry</button>

</div>
</div>

<div class="card">
<h3>Work Calendar</h3>
<div id="calendar"></div>
</div>

</div>

<div class="card" style="margin:20px;">
<h3>Submitted Entries</h3>
<table>
<thead>
<tr>
<th>Date</th><th>Engineer</th><th>Status</th><th>Billable</th>
<th>Non Billable</th><th>Tickets</th><th>Closed</th>
<th>Escalated</th><th>Waiting</th><th>Scheduled</th><th>Comment</th><th>Action</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,addDoc,getDocs,doc,updateDoc,deleteDoc,query,where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
authDomain:"metricspark-1456b.firebaseapp.com",
projectId:"metricspark-1456b",
storageBucket:"metricspark-1456b.appspot.com",
messagingSenderId:"958626906247",
appId:"1:958626906247:web:0ed0f6ea8607e233e2b822"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailMap = {
"aman.thakur@itbd.net":"Aman Thakur"
};

const engineerName = document.getElementById("engineerName");
const saveBtn = document.getElementById("saveBtn");
const logoutBtn = document.getElementById("logoutBtn");
const exportBtn = document.getElementById("exportBtn");
const userEmailSpan = document.getElementById("userEmail");

const dateInput = document.getElementById("date");
const status = document.getElementById("status");
const manager = document.getElementById("manager");
const billable = document.getElementById("billable");
const nonbillable = document.getElementById("nonbillable");
const tickets = document.getElementById("tickets");
const closed = document.getElementById("closed");
const escalated = document.getElementById("escalated");
const waiting = document.getElementById("waiting");
const scheduled = document.getElementById("scheduled");
const comment = document.getElementById("comment");
const dataTable = document.getElementById("dataTable");

let editId = null;

/* AUTH */
onAuthStateChanged(auth,(user)=>{
if(user){
userEmailSpan.textContent = user.email;
if(emailMap[user.email]){
engineerName.value = emailMap[user.email];
}
loadData();
}else{
window.location.href="index.html";
}
});

/* LOGOUT */
logoutBtn.onclick = async ()=>{
await signOut(auth);
window.location.href="index.html";
};

/* SAVE */
saveBtn.onclick = async () => {

const user = auth.currentUser;

if(!engineerName.value){
alert("Select Engineer");
return;
}

const entry = {
userId: user.uid,
date:dateInput.value,
engineerName: engineerName.value,
name: user.email,
status:status.value,
manager:manager.value,
billable:Number(billable.value || 0),
nonbillable:Number(nonbillable.value || 0),
tickets:Number(tickets.value || 0),
closed:Number(closed.value || 0),
escalated:Number(escalated.value || 0),
waiting:Number(waiting.value || 0),
scheduled:Number(scheduled.value || 0),
comment:comment.value
};

if(editId){
await updateDoc(doc(db,"worklog",editId), entry);
editId=null;
}else{
await addDoc(collection(db,"worklog"), entry);
}

loadData();
};

/* LOAD ONLY USER DATA */
async function loadData(){

const user = auth.currentUser;
if(!user) return;

const q = query(
collection(db,"worklog"),
where("userId","==",user.uid)
);

const snap = await getDocs(q);

dataTable.innerHTML="";

snap.forEach(docSnap=>{
const x = docSnap.data();
const id = docSnap.id;

dataTable.innerHTML+=`
<tr>
<td>${x.date}</td>
<td>${x.engineerName}</td>
<td>${x.status}</td>
<td>${x.billable}</td>
<td>${x.nonbillable}</td>
<td>${x.tickets}</td>
<td>${x.closed}</td>
<td>${x.escalated}</td>
<td>${x.waiting}</td>
<td>${x.scheduled}</td>
<td>${x.comment}</td>
<td>
<button onclick="editEntry('${id}')">Edit</button>
<button onclick="deleteEntry('${id}')">Delete</button>
</td>
</tr>`;
});
}

/* EXPORT ONLY USER DATA */
exportBtn.onclick = async ()=>{

const user = auth.currentUser;

const q = query(
collection(db,"worklog"),
where("userId","==",user.uid)
);

const snap = await getDocs(q);

let csv="Date,Engineer,Status,Billable,NonBillable,Tickets,Closed,Escalated,Waiting,Scheduled,Comment\n";

snap.forEach(doc=>{
const x=doc.data();
csv+=`${x.date},${x.engineerName},${x.status},${x.billable},${x.nonbillable},${x.tickets},${x.closed},${x.escalated},${x.waiting},${x.scheduled},${x.comment}\n`;
});

const blob=new Blob([csv],{type:"text/csv"});
const url=URL.createObjectURL(blob);
const a=document.createElement("a");
a.href=url;
a.download="My_Data.csv";
a.click();
};

/* EDIT */
window.editEntry = async(id)=>{
const snap = await getDocs(collection(db,"worklog"));
snap.forEach(docSnap=>{
if(docSnap.id===id){
const d=docSnap.data();
dateInput.value=d.date;
engineerName.value=d.engineerName;
status.value=d.status;
manager.value=d.manager;
billable.value=d.billable;
nonbillable.value=d.nonbillable;
tickets.value=d.tickets;
closed.value=d.closed;
escalated.value=d.escalated;
waiting.value=d.waiting;
scheduled.value=d.scheduled;
comment.value=d.comment;
editId=id;
}
});
};

/* DELETE */
window.deleteEntry = async(id)=>{
if(!confirm("Delete?")) return;
await deleteDoc(doc(db,"worklog",id));
loadData();
};

const calendar=new FullCalendar.Calendar(document.getElementById("calendar"),{
initialView:"dayGridMonth",
dateClick:(info)=> dateInput.value=info.dateStr
});

calendar.render();

</script>

</body>
</html>
