<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter','Segoe UI',sans-serif;
background: linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background: rgba(0,0,0,0.35);
color:white;
}

.header-right{
display:flex;
gap:10px;
align-items:center;
}

button{
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.logout-btn{background:#ef4444;color:white;}

.main{
display:grid;
grid-template-columns:2fr 1fr;
gap:24px;
padding:24px;
}

.card{
background:white;
padding:24px;
border-radius:18px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

.full{grid-column:span 2;}

input, select{
height:48px;
padding:0 14px;
border-radius:12px;
border:1px solid #e5e7eb;
background:#f9fafb;
}

.save-btn{
width:100%;
height:48px;
background:#2563eb;
color:white;
border-radius:12px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#111827;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
MetricSpark Dashboard
<div class="header-right">
<span id="userName"></span>
<button class="logout-btn" id="logoutBtn">Logout</button>
</div>
</div>

<div class="main">

<div class="card">
<h3>Daily Work Entry</h3>

<div class="form-grid">

<input type="date" id="date">

<select id="engineerName">
<option value="">Select Engineer</option>
<option>Aman</option>
<option>Kundan</option>
<option>Valor</option>
<option>Tianna</option>
<option>Maxwell</option>
<option>Verney</option>
<option>Junaid</option>
<option>Dexter</option>
<option>Palak</option>
</select>

<select id="status">
<option value="">Status</option>
<option>Working</option>
<option>PTO</option>
<option>Week Off</option>
</select>

<select id="manager">
<option value="">Manager</option>
<option>Aman Thakur</option>
<option>Akhilesh</option>
<option>Kip</option>
<option>Ash</option>
<option>Amit</option>
</select>

<input type="number" id="billable" placeholder="Billable">
<input type="number" id="nonbillable" placeholder="Non Billable">

<input type="number" id="tickets" placeholder="Tickets">
<input type="number" id="closed" placeholder="Closed">

<input type="number" id="escalated" placeholder="Escalated">
<input type="number" id="waiting" placeholder="Waiting">

<input type="number" id="scheduled" placeholder="Scheduled">
<div></div>

<input type="text" id="comment" placeholder="Comment" class="full">

<button class="save-btn full" id="saveBtn">Save Entry</button>

</div>
</div>

<div class="card">
<h3>Work Calendar</h3>
<div id="calendar"></div>
</div>

</div>

<div class="card" style="margin:20px;">
<h3>Submitted Entries</h3>
<table>
<thead>
<tr>
<th>Date</th><th>Engineer</th><th>Status</th><th>Billable</th>
<th>Non Billable</th><th>Tickets</th><th>Closed</th>
<th>Escalated</th><th>Waiting</th><th>Scheduled</th><th>Comment</th><th>Action</th>
</tr>
</thead>
<tbody id="dataTable"></tbody>
</table>
</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,addDoc,doc,updateDoc,deleteDoc,query,where,onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
authDomain:"metricspark-1456b.firebaseapp.com",
projectId:"metricspark-1456b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentName = "";
let editId = null;
let unsubscribe = null;

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser = user;

// ✅ Convert email to Proper Name
let emailName = user.email.split("@")[0];
currentName = emailName
    .split(".")
    .map(word => word.charAt(0).toUpperCase() + word.slice(1))
    .join(" ");

// ✅ Header
document.getElementById("userName").textContent = currentName;

// ✅ Engineer dropdown ONLY this name
const engineerDropdown = document.getElementById("engineerName");
engineerDropdown.innerHTML = "";

const option = document.createElement("option");
option.value = currentName;
option.text = currentName;
engineerDropdown.appendChild(option);

engineerDropdown.value = currentName;

startRealtime();
}else{
window.location.href="index.html";
}
});

function startRealtime(){
if(unsubscribe) unsubscribe();

const q = query(collection(db,"worklog"), where("userId","==",currentUser.uid));

unsubscribe = onSnapshot(q,(snap)=>{
const table = document.getElementById("dataTable");
table.innerHTML="";

snap.forEach(docSnap=>{
const x = docSnap.data();
const id = docSnap.id;

table.innerHTML+=`
<tr>
<td>${x.date||""}</td>
<td>${x.engineerName||""}</td>
<td>${x.status||""}</td>
<td>${x.billable||0}</td>
<td>${x.nonbillable||0}</td>
<td>${x.tickets||0}</td>
<td>${x.closed||0}</td>
<td>${x.escalated||0}</td>
<td>${x.waiting||0}</td>
<td>${x.scheduled||0}</td>
<td>${x.comment||""}</td>
<td>
<button onclick="editEntry('${id}')">Edit</button>
<button onclick="deleteEntry('${id}')">Delete</button>
</td>
</tr>`;
});
});
}

document.getElementById("saveBtn").onclick = async ()=>{
const entry = {
userId: currentUser.uid,
engineerName: currentName,
date: document.getElementById("date").value,
status: document.getElementById("status").value,
manager: document.getElementById("manager").value,
billable:Number(document.getElementById("billable").value||0),
nonbillable:Number(document.getElementById("nonbillable").value||0),
tickets:Number(document.getElementById("tickets").value||0),
closed:Number(document.getElementById("closed").value||0),
escalated:Number(document.getElementById("escalated").value||0),
waiting:Number(document.getElementById("waiting").value||0),
scheduled:Number(document.getElementById("scheduled").value||0),
comment:document.getElementById("comment").value
};

if(editId){
await updateDoc(doc(db,"worklog",editId), entry);
editId=null;
}else{
await addDoc(collection(db,"worklog"), entry);
}
};

window.editEntry = async(id)=>{ editId=id; };
window.deleteEntry = async(id)=>{ await deleteDoc(doc(db,"worklog",id)); };

document.getElementById("logoutBtn").onclick = async ()=>{
await signOut(auth);
window.location.href="index.html";
};

new FullCalendar.Calendar(document.getElementById("calendar"),{
initialView:"dayGridMonth",
dateClick:(info)=> document.getElementById("date").value=info.dateStr
}).render();

</script>

</body>
</html>
