<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Manager Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(90deg,#0f2027,#203a43,#2c5364);
    color: white;
    display: flex;
}

/* 🔹 Sidebar */
.sidebar {
    width: 250px;
    background: rgba(0,0,0,0.5);
    height: 100vh;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
}

.sidebar h3 {
    margin-top: 0;
    margin-bottom: 15px;
    font-size: 18px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 10px;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

.sidebar li {
    padding: 10px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar li:hover {
    background: rgba(255,255,255,0.25);
}

/* 🔹 Main */
.main {
    flex: 1;
}

/* 🔹 Header */
.header {
    padding: 15px 30px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
}

.logout {
    float: right;
    cursor: pointer;
    color: #ff4d4d;
}

/* 🔹 Content */
.container {
    padding: 20px;
}

.card {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
    authDomain: "metricspark-1456b.firebaseapp.com",
    projectId: "metricspark-1456b",
    storageBucket: "metricspark-1456b.appspot.com",
    messagingSenderId: "958626906247",
    appId: "1:958626906247:web:0ed0f6ea8607e233e2b822"
};

firebase.initializeApp(firebaseConfig);

// 🔒 Protect page
firebase.auth().onAuthStateChanged((user) => {
    if (!user) {
        window.location.href = "index.html";
    }
});

// 🚪 Logout
function logout() {
    firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
    });
}

// 🎫 Load tickets
async function loadTickets() {
    try {
        const res = await fetch("http://localhost:5000/tickets");
        const data = await res.json();

        const container = document.getElementById("tickets");

        if (!data || data.length === 0) {
            container.innerHTML = "<p>No tickets found</p>";
            return;
        }

        container.innerHTML = data.map(ticket => `
            <div class="card">
                <strong>${ticket.summary || "No Summary"}</strong><br><br>
                Status: ${ticket.status?.name || "N/A"}<br>
                Priority: ${ticket.priority?.name || "N/A"}<br>
                Company: ${ticket.company?.name || "N/A"}
            </div>
        `).join("");

    } catch (err) {
        console.error(err);
        document.getElementById("tickets").innerHTML = "❌ Error loading tickets";
    }
}

// 🚀 Init
window.onload = loadTickets;
</script>

</head>

<body>

<!-- 🔹 Sidebar -->
<div class="sidebar">
    <h3>🏢 Companies</h3>
    <ul>
        <li>Etech7</li>
        <li>Continuous Networks LLC</li>
        <li>ICSI</li>
        <li>In-Telecom</li>
        <li>iStreet Solutions</li>
        <li>ITCubed</li>
        <li>NerdsToGo</li>
        <li>Pegasus Technology (Cal)</li>
        <li>PTS</li>
        <li>Perfect Cloud Solutions</li>
        <li>Dataprise</li>
        <li>Milner</li>
    </ul>
</div>

<!-- 🔹 Main -->
<div class="main">

    <div class="header">
        MetricSpark Dashboard
        <span class="logout" onclick="logout()">Logout</span>
    </div>

    <div class="container">
        <h2>🎫 Service Tickets</h2>
        <div id="tickets">Loading tickets...</div>
    </div>

</div>

</body>
</html>
