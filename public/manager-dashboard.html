<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Manager Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(90deg,#0f2027,#203a43,#2c5364);
    color: white;
}

.header {
    padding: 15px 30px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(0,0,0,0.3);
}

.container {
    padding: 20px;
}

.kpi-container {
    display: flex;
    gap: 15px;
    margin-bottom: 20px;
}

.kpi-card {
    flex: 1;
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}

.card {
    background: white;
    color: black;
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 10px;
}

.logout {
    float: right;
    cursor: pointer;
    color: #ff4d4d;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
    authDomain: "metricspark-1456b.firebaseapp.com",
    projectId: "metricspark-1456b",
    storageBucket: "metricspark-1456b.appspot.com",
    messagingSenderId: "958626906247",
    appId: "1:958626906247:web:0ed0f6ea8607e233e2b822"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged((user) => {
    if (!user) window.location.href = "index.html";
});

function logout() {
    firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
    });
}

const API_URL = "https://metricspark-backend.onrender.com/tickets";

async function loadTickets() {
    try {
        let res = await fetch(API_URL);

        // 🔁 Retry if Render sleeping
        if (!res.ok) {
            await new Promise(r => setTimeout(r, 3000));
            res = await fetch(API_URL);
        }

        const data = await res.json();

        console.log("DATA:", data); // debug

        if (!Array.isArray(data)) {
            document.getElementById("tickets").innerHTML = "❌ Invalid data from server";
            return;
        }

        const openTickets = data.filter(t => !t.closedDate);

        document.getElementById("total").innerText = openTickets.length;

        const boardData = {};
        const engineerCounts = {};

        openTickets.forEach(ticket => {
            const board = ticket.board?.name || "Unknown";
            const owner = ticket.owner?.name || "Unassigned";

            if (!boardData[board]) {
                boardData[board] = { count: 0, owners: {} };
            }

            boardData[board].count++;
            boardData[board].owners[owner] =
                (boardData[board].owners[owner] || 0) + 1;

            engineerCounts[owner] =
                (engineerCounts[owner] || 0) + 1;
        });

        // Charts
        if (window.boardChart) window.boardChart.destroy();
        window.boardChart = new Chart(document.getElementById("boardChart"), {
            type: "bar",
            data: {
                labels: Object.keys(boardData),
                datasets: [{
                    label: "Open Tickets per Board",
                    data: Object.values(boardData).map(b => b.count)
                }]
            }
        });

        if (window.engineerChart) window.engineerChart.destroy();
        window.engineerChart = new Chart(document.getElementById("engineerChart"), {
            type: "bar",
            data: {
                labels: Object.keys(engineerCounts),
                datasets: [{
                    label: "Open Tickets per Engineer",
                    data: Object.values(engineerCounts)
                }]
            }
        });

        // Board Summary
        document.getElementById("boardSummary").innerHTML =
            Object.entries(boardData).map(([board, info]) => {
                const ownersList = Object.entries(info.owners)
                    .map(([o, c]) => `${o} (${c})`).join(", ");

                return `
                    <div class="card">
                        <strong>🏢 ${board}</strong><br><br>
                        🎫 Open Tickets: ${info.count}<br>
                        👨‍💻 Owners: ${ownersList}
                    </div>
                `;
            }).join("");

        // Tickets
        document.getElementById("tickets").innerHTML =
            openTickets.map(ticket => {

                let age = "N/A";
                if (ticket.dateEntered) {
                    const diff = Math.floor((new Date() - new Date(ticket.dateEntered)) / (1000*60*60*24));
                    age = diff + " days";
                }

                return `
                    <div class="card">
                        <strong>#${ticket.id} - ${ticket.summary}</strong><br><br>
                        👤 ${ticket.owner?.name || "Unassigned"}<br>
                        🏢 ${ticket.board?.name || "N/A"}<br>
                        ⏱ ${age}
                    </div>
                `;
            }).join("");

    } catch (err) {
        console.error(err);
        document.getElementById("tickets").innerHTML = "❌ Backend not reachable";
    }
}

window.onload = loadTickets;
</script>
</head>

<body>

<div class="header">
    MetricSpark Dashboard
    <span class="logout" onclick="logout()">Logout</span>
</div>

<div class="container">

    <div class="kpi-container">
        <div class="kpi-card">🎫 Open Tickets<br><span id="total">0</span></div>
    </div>

    <div style="display:flex; gap:20px; margin-bottom:20px;">
        <canvas id="boardChart"></canvas>
        <canvas id="engineerChart"></canvas>
    </div>

    <div id="boardSummary"></div>

    <h2>🎫 Open Tickets</h2>
    <div id="tickets">Loading tickets...</div>

</div>

</body>
</html>
