<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
    background: #0f172a;
    color: white;
}

/* Topbar */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 50px;
    background: #020617;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    border-bottom: 1px solid #1e293b;
    z-index: 1000;
}

.logout-btn {
    background: #ef4444;
    border: none;
    padding: 6px 12px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #020617;
    padding: 20px;
    overflow-y: auto;
    margin-top: 50px;
}

.sidebar h3 {
    margin-top: 20px;
    border-bottom: 1px solid #334155;
    padding-bottom: 5px;
}

.item {
    padding: 8px 5px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    margin-top: 50px;
}

.header {
    font-size: 20px;
    margin-bottom: 20px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: #020617;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #1e293b;
    text-align: left;
}

th {
    background: #1e293b;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// ============================
// FIREBASE
// ============================
const firebaseConfig = {
    apiKey: "AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
    authDomain: "metricspark-1456b.firebaseapp.com",
    projectId: "metricspark-1456b"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged((user) => {
    if (!user) window.location.href = "index.html";
});

function logout() {
    firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
    });
}

// ============================
// API CONFIG
// ============================
const API_URL = "http://localhost:5000/tickets";
const TOKEN = "metricspark123";

// ============================
// LOAD DASHBOARD (FIXED)
// ============================
async function loadDashboard() {
    try {
        const res = await fetch(API_URL, {
            method: "GET",
            headers: {
                "Authorization": "Bearer " + TOKEN,
                "Content-Type": "application/json"
            }
        });

        if (!res.ok) {
            const text = await res.text();
            throw new Error(`API ${res.status}: ${text}`);
        }

        const data = await res.json();

        console.log("✅ API DATA:", data);

        renderBoards(data.boards || []);
        renderOwners(data.owners || []);
        renderTickets(data.tickets || []);

    } catch (err) {
        console.error("❌ ERROR:", err);
        document.getElementById("tickets").innerHTML =
            `<tr><td colspan="7">❌ ${err.message}</td></tr>`;
    }
}

// ============================
// SIDEBAR (FIXED)
// ============================
function renderBoards(boards) {
    const container = document.getElementById("boards");

    if (!boards || boards.length === 0) {
        container.innerHTML = "<div>No boards found</div>";
        return;
    }

    boards.sort((a, b) => b.count - a.count);

    container.innerHTML = boards.map(b =>
        `<div class="item">
            <span>${b.name}</span>
            <span>${b.count}</span>
        </div>`
    ).join("");
}

function renderOwners(owners) {
    const container = document.getElementById("owners");

    if (!owners || owners.length === 0) {
        container.innerHTML = "<div>No owners found</div>";
        return;
    }

    owners.sort((a, b) => b.count - a.count);

    container.innerHTML = owners.map(o =>
        `<div class="item">
            <span>${o.name}</span>
            <span>${o.count}</span>
        </div>`
    ).join("");
}

// ============================
// TICKETS TABLE
// ============================
function renderTickets(tickets) {
    const container = document.getElementById("tickets");

    if (!tickets || tickets.length === 0) {
        container.innerHTML = "<tr><td colspan='7'>No tickets found</td></tr>";
        return;
    }

    container.innerHTML = tickets.map(t => `
        <tr>
            <td>${t.id}</td>
            <td>${t.summary}</td>
            <td>${t.board}</td>
            <td>${t.owner}</td>
            <td>${t.status}</td>
            <td>${t.priority}</td>
            <td>${t.age}</td>
        </tr>
    `).join("");
}

// ============================
// INIT
// ============================
loadDashboard();
setInterval(loadDashboard, 60000);
</script>

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div>🚀 MetricSpark Milner Team Dashboard</div>
    <button onclick="logout()" class="logout-btn">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📊 Dashboard</h2>

    <h3>Boards</h3>
    <div id="boards"></div>

    <h3>Owners</h3>
    <div id="owners"></div>
</div>

<!-- MAIN -->
<div class="main">
    <div class="header">🎫 Open Tickets</div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Summary</th>
                <th>Board</th>
                <th>Owner</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody id="tickets">
            <tr><td colspan="7">Loading...</td></tr>
        </tbody>
    </table>
</div>

</body>
</html>
