<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MetricSpark | Milner Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            display: flex;
            background: #0a0f1d; /* Very deep dark navy */
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 260px;
            background: #111827; /* Solid slightly lighter navy */
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            padding: 20px;
            position: fixed;
            height: 100%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 50;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: 'N';
            display: inline-block;
            color: #00c6ff;
            font-size: 24px;
        }
        .team-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 15px;
            padding: 0 10px;
            font-weight: 600;
        }

        .client-header {
            padding: 10px 16px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .client-header:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .client-header.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .engineer-list {
            margin-left: 20px;
            margin-bottom: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding-left: 5px;
            display: none;
            flex-direction: column;
            gap: 2px;
        }
        
        .engineer-list.open {
            display: flex;
        }

        .engineer-item {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: all 0.3s ease;
        }

        .engineer-item:hover, .engineer-item.active {
            color: #fff;
            background: rgba(255,255,255, 0.05);
            font-weight: 600;
        }

        .logout-btn {
            margin-top: auto;
            color: #ef4444;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* ===== Main Content ===== */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
            max-width: 1600px;
        }

        .title {
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
            color: #fff;
        }

        /* ===== KPI Cards ===== */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: linear-gradient(145deg, rgba(22, 30, 49, 0.9), rgba(18, 24, 38, 0.9));
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: rgba(0, 198, 255, 0.2);
        }

        .kpi-card h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #94a3b8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-card p {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }
        
        .kpi-trend {
            font-size: 12px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
        }
        .kpi-trend.positive { color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .kpi-trend.negative { color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .kpi-trend.neutral { color: #f59e0b; background: rgba(245, 158, 11, 0.1); }

        /* ===== Toggle Buttons ===== */
        .toggle-container {
            margin-bottom: 20px;
            display: inline-flex;
            background: #161e31;
            padding: 4px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: #6c7a9c;
            font-weight: 500;
            transition: all 0.3s ease;
            font-size: 13px;
        }

        .toggle-btn.active {
            background: #2b364e;
            color: #fff;
        }

        /* ===== Charts ===== */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
        }

        .chart-card {
            background: #161e31;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .chart-title-area {
            margin-bottom: 25px;
        }

        .chart-title-area h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            color: #6c7a9c;
            font-weight: 600;
        }
        
        .chart-title-area p {
            font-size: 16px;
            color: #fff;
            font-weight: 400;
        }

        .chart-wrap {
            position: relative;
            flex: 1;
            min-height: 280px;
            width: 100%;
        }
    </style>
</head>
<body>

<!-- ===== Sidebar ===== -->
<div class="sidebar">
    <div class="logo">MetricSpark</div>

    <div class="team-title">Team</div>
    <div id="sidebarMenu"></div>
    
    <!-- Logout Button added to sidebar -->
    <div class="logout-btn" onclick="window.location.href='index.html'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        Logout
    </div>
</div>

<!-- ===== Main Content ===== -->
<div class="main-content">
    <h1 class="title" id="clientTitle">Milner Analytics</h1>

    <!-- KPI Cards -->
    <div class="kpi-container">
        <div class="kpi-card">
            <h3>Tickets Worked <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3a78ff" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg></h3>
            <p id="ticketsWorked">0</p>
            <div class="kpi-trend" id="trendWorked">--</div>
        </div>
        <div class="kpi-card">
            <h3>Tickets Closed <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00f0ff" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg></h3>
            <p id="ticketsClosed">0</p>
            <div class="kpi-trend" id="trendClosed">--</div>
        </div>
        <div class="kpi-card">
            <h3>Resolution Rate <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="16 12 12 8 8 12"></polyline><line x1="12" y1="16" x2="12" y2="8"></line></svg></h3>
            <p id="resolutionRate">0%</p>
            <div class="kpi-trend" id="trendResRate">--</div>
        </div>
        <div class="kpi-card">
            <h3>Billable Util. <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></h3>
            <p id="billableUtilization">0%</p>
            <div class="kpi-trend" id="trendBillable">--</div>
        </div>
    </div>

    <!-- Trend Toggle -->
    <div class="toggle-container">
        <button class="toggle-btn active" onclick="switchTrend('weekly', this)">Weekly Trend</button>
        <button class="toggle-btn" onclick="switchTrend('daily', this)">Daily Trend</button>
    </div>

    <!-- Charts -->
    <div class="chart-grid">
        <div class="chart-card">
            <div class="chart-title-area">
                 <h3>Billable vs Non-Billable Hours</h3>
                 <p>Total Hours: <span id="totalHrs"></span>k (Avg. Billable: <span id="avgBill"></span>k)</p>
            </div>
            <div class="chart-wrap"><canvas id="utilizationChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title-area">
                <h3>Tickets Worked vs Closed</h3>
                <p>Tickets (<span id="totWorked"></span> Worked, <span id="totClosed"></span> Closed)</p>
            </div>
            <div class="chart-wrap"><canvas id="ticketChart"></canvas></div>
        </div>
        <div class="chart-card" style="grid-column: 1 / -1;">
            <div class="chart-title-area">
                <h3>Engineer Performance Trend</h3>
            </div>
            <div class="chart-wrap" style="height: 350px;"><canvas id="engineerTrendChart"></canvas></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
  authDomain: "metricspark-1456b.firebaseapp.com",
  projectId: "metricspark-1456b"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
    if (!user) {
        window.location.href = "index.html";
    }
});

let trendType = 'weekly';
let currentClient = 'Milner';
let utilizationChart, ticketChart, engineerTrendChart;

let clientData = {
    "Milner": {
        weekly: { labels: [], billable: [], nonBillable: [], worked: [], closed: [], engineers: {} },
        daily: { labels: [], billable: [], nonBillable: [], worked: [], closed: [], engineers: {} }
    }
};

// Fetch real-time data from Firestore
const q = query(collection(db, "worklog_entries"));
onSnapshot(q, (snap) => {
    const entries = [];
    snap.forEach(doc => entries.push(doc.data()));
    
    entries.sort((a, b) => new Date(a.date) - new Date(b.date));

    const allDates = [...new Set(entries.map(e => e.date).filter(Boolean))].sort();
    
    // Get last 7 days for weekly, last 5 for daily
    const weeklyLabels = allDates.slice(-7);
    const dailyLabels = allDates.slice(-5);
    
    // Reset Data
    clientData = {
        "Milner": {
            weekly: { labels: weeklyLabels.map(d => d.slice(5)), billable: Array(weeklyLabels.length).fill(0), nonBillable: Array(weeklyLabels.length).fill(0), worked: Array(weeklyLabels.length).fill(0), closed: Array(weeklyLabels.length).fill(0), engineers: {} },
            daily: { labels: dailyLabels.map(d => d.slice(5)), billable: Array(dailyLabels.length).fill(0), nonBillable: Array(dailyLabels.length).fill(0), worked: Array(dailyLabels.length).fill(0), closed: Array(dailyLabels.length).fill(0), engineers: {} }
        }
    };
    
    const allEngineers = [...new Set(entries.map(e => e.engineerName))].filter(Boolean);
    
    allEngineers.forEach(eng => {
        clientData['Milner'].weekly.engineers[eng] = { trend: Array(weeklyLabels.length).fill(0), billable: Array(weeklyLabels.length).fill(0), nonBillable: Array(weeklyLabels.length).fill(0), worked: Array(weeklyLabels.length).fill(0), closed: Array(weeklyLabels.length).fill(0) };
        clientData['Milner'].daily.engineers[eng] = { trend: Array(dailyLabels.length).fill(0), billable: Array(dailyLabels.length).fill(0), nonBillable: Array(dailyLabels.length).fill(0), worked: Array(dailyLabels.length).fill(0), closed: Array(dailyLabels.length).fill(0) };
    });
    
    entries.forEach(e => {
        if (!e.date || !e.engineerName) return;
        
        const wIdx = weeklyLabels.indexOf(e.date);
        const dIdx = dailyLabels.indexOf(e.date);
        
        const b = Number(e.billable) || 0;
        const nb = Number(e.nonbillable) || 0;
        const w = Number(e.tickets) || 0;
        const c = Number(e.closed) || 0;
        
        if (wIdx !== -1) {
            clientData['Milner'].weekly.billable[wIdx] += b;
            clientData['Milner'].weekly.nonBillable[wIdx] += nb;
            clientData['Milner'].weekly.worked[wIdx] += w;
            clientData['Milner'].weekly.closed[wIdx] += c;
            
            clientData['Milner'].weekly.engineers[e.engineerName].trend[wIdx] += w; 
            clientData['Milner'].weekly.engineers[e.engineerName].billable[wIdx] += b;
            clientData['Milner'].weekly.engineers[e.engineerName].nonBillable[wIdx] += nb;
            clientData['Milner'].weekly.engineers[e.engineerName].worked[wIdx] += w;
            clientData['Milner'].weekly.engineers[e.engineerName].closed[wIdx] += c;
        }
        
        if (dIdx !== -1) {
            clientData['Milner'].daily.billable[dIdx] += b;
            clientData['Milner'].daily.nonBillable[dIdx] += nb;
            clientData['Milner'].daily.worked[dIdx] += w;
            clientData['Milner'].daily.closed[dIdx] += c;
            
            clientData['Milner'].daily.engineers[e.engineerName].trend[dIdx] += w;
            clientData['Milner'].daily.engineers[e.engineerName].billable[dIdx] += b;
            clientData['Milner'].daily.engineers[e.engineerName].nonBillable[dIdx] += nb;
            clientData['Milner'].daily.engineers[e.engineerName].worked[dIdx] += w;
            clientData['Milner'].daily.engineers[e.engineerName].closed[dIdx] += c;
        }
    });

    renderSidebar();
    loadCharts();
});

let currentEngineer = null;

function renderSidebar() {
    const menu = document.getElementById('sidebarMenu');
    menu.innerHTML = '';
    
    // Team Overview Button
    let overviewBtn = document.createElement('div');
    overviewBtn.className = `client-header ${!currentEngineer ? 'active' : ''}`;
    overviewBtn.innerHTML = `<span>Team Overview</span>`;
    overviewBtn.onclick = () => window.selectClient('Milner');
    menu.appendChild(overviewBtn);

    // Engineers Header
    let engHeader = document.createElement('div');
    engHeader.className = 'team-title';
    engHeader.style.marginTop = '20px';
    engHeader.textContent = 'Engineers';
    menu.appendChild(engHeader);
    
    // Engineers List
    let engList = document.createElement('div');
    engList.className = `engineer-list open`;
    engList.style.borderLeft = 'none'; // Remove nested border
    engList.style.marginLeft = '10px'; // Adjust margin
    
    if (clientData['Milner'].weekly.engineers) {
        Object.keys(clientData['Milner'].weekly.engineers).forEach(eng => {
             let eDiv = document.createElement('div');
             eDiv.className = `engineer-item ${currentEngineer === eng ? 'active' : ''}`;
             eDiv.textContent = eng;
             eDiv.onclick = (e) => {
                 e.stopPropagation();
                 window.selectEngineer('Milner', eng);
             }
             engList.appendChild(eDiv);
        });
    }
    
    menu.appendChild(engList);
}

window.selectClient = function(client) {
    currentClient = 'Milner';
    currentEngineer = null;
    document.getElementById('clientTitle').textContent = `Milner Analytics - Team Overview`;
    renderSidebar();
    loadCharts();
}

window.selectEngineer = function(client, engineer) {
    currentClient = 'Milner';
    currentEngineer = engineer;
    document.getElementById('clientTitle').textContent = `${engineer} - Performance`;
    renderSidebar();
    loadCharts();
}

window.switchTrend = function(type, element) {
    trendType = type;
    document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
    element.classList.add('active');
    loadCharts();
}

function loadCharts() {
    const clientPeriodData = clientData[currentClient][trendType];
    const data = currentEngineer ? clientPeriodData.engineers[currentEngineer] : clientPeriodData;

    if (utilizationChart) utilizationChart.destroy();
    if (ticketChart) ticketChart.destroy();
    if (engineerTrendChart) engineerTrendChart.destroy();

    const totalWorked = data.worked.reduce((a, b) => a + b, 0);
    const totalClosed = data.closed.reduce((a, b) => a + b, 0);
    const totalBillable = data.billable.reduce((a, b) => a + b, 0);
    const totalNonBillable = data.nonBillable.reduce((a, b) => a + b, 0);

    // Dynamic mock previous data for trends
    const prevWorked = totalWorked * (0.8 + Math.random() * 0.4); 
    const prevClosed = totalClosed * (0.8 + Math.random() * 0.4);
    const prevBillable = totalBillable * (0.9 + Math.random() * 0.2);
    const prevNonBillable = totalNonBillable * (0.9 + Math.random() * 0.2);

    document.getElementById('ticketsWorked').textContent = totalWorked;
    document.getElementById('ticketsClosed').textContent = totalClosed;
    
    const resRate = totalWorked ? ((totalClosed / totalWorked) * 100) : 0;
    document.getElementById('resolutionRate').textContent = resRate.toFixed(1) + '%';
    
    const utilRate = (totalBillable + totalNonBillable) ? ((totalBillable / (totalBillable + totalNonBillable)) * 100) : 0;
    document.getElementById('billableUtilization').textContent = utilRate.toFixed(1) + '%';

    // Update Trend Badges
    const updateTrend = (id, current, previous) => {
        const el = document.getElementById(id);
        if(!previous) { el.style.display = 'none'; return; }
        el.style.display = 'inline-flex';
        
        const diff = current - previous;
        const percDiff = (diff / previous) * 100;
        
        let icon = percDiff >= 0 ? '↑' : '↓';
        let className = percDiff >= 0 ? 'positive' : 'negative';
        
        if (Math.abs(percDiff) < 1) {
            icon = '→';
            className = 'neutral';
        }

        el.className = `kpi-trend ${className}`;
        el.textContent = `${icon} ${Math.abs(percDiff).toFixed(1)}% vs prev`;
    };

    updateTrend('trendWorked', totalWorked, prevWorked);
    updateTrend('trendClosed', totalClosed, prevClosed);
    const prevResRate = prevWorked ? (prevClosed / prevWorked) * 100 : 0;
    updateTrend('trendResRate', resRate, prevResRate);
    const prevUtilRate = (prevBillable + prevNonBillable) ? (prevBillable / (prevBillable + prevNonBillable)) * 100 : 0;
    updateTrend('trendBillable', utilRate, prevUtilRate);

    document.getElementById('totalHrs').textContent = ((totalBillable + totalNonBillable)/10).toFixed(1);
    document.getElementById('avgBill').textContent = (totalBillable/10).toFixed(1);
    document.getElementById('totWorked').textContent = totalWorked;
    document.getElementById('totClosed').textContent = totalClosed;

    const glowPlugin = {
        id: 'glow',
        beforeDatasetDraw(chart, args) {
            const ctx = chart.ctx;
            const dataset = chart.data.datasets[args.index];
            ctx.save();
            if (chart.config.type === 'line') {
                ctx.shadowColor = dataset.borderColor;
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 4;
            } else if (chart.config.type === 'bar') {
                if (dataset.label === 'Closed' || dataset.label === 'Non-billable') {
                    ctx.shadowColor = '#00f0ff';
                    ctx.shadowBlur = 15;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                }
            }
        },
        afterDatasetDraw(chart) {
            chart.ctx.restore();
        }
    };

    Chart.register(glowPlugin);

    Chart.defaults.color = '#546383';
    Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
    
    const commonOptions = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { 
            legend: { 
                position: 'bottom',
                labels: { 
                    usePointStyle: true, 
                    boxWidth: 8, 
                    padding: 25,
                    font: { size: 12 }
                } 
            },
            tooltip: {
                backgroundColor: 'rgba(22, 30, 49, 0.95)',
                titleColor: '#fff',
                bodyColor: '#e2e8f0',
                borderColor: 'rgba(255, 255, 255, 0.1)',
                borderWidth: 1,
                padding: 12,
                boxPadding: 4,
                usePointStyle: true,
                intersect: false,
                mode: 'index'
            }
        },
        scales: {
            x: { grid: { color: 'rgba(255, 255, 255, 0.02)', drawBorder: false } },
            y: { grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false }, beginAtZero: true }
        },
        interaction: { mode: 'index', intersect: false }
    };

    const ctxUtil = document.getElementById('utilizationChart').getContext('2d');
    
    let gradBlue = ctxUtil.createLinearGradient(0, 0, 0, 300);
    gradBlue.addColorStop(0, 'rgba(58, 120, 255, 0.2)');
    gradBlue.addColorStop(1, 'rgba(58, 120, 255, 0.0)');

    let gradCyan = ctxUtil.createLinearGradient(0, 0, 0, 300);
    gradCyan.addColorStop(0, 'rgba(0, 240, 255, 0.2)');
    gradCyan.addColorStop(1, 'rgba(0, 240, 255, 0.0)');

    utilizationChart = new Chart(ctxUtil, {
        type: 'line',
        data: {
            labels: clientPeriodData.labels,
            datasets: [
                { 
                    label: 'Billable', data: data.billable, 
                    borderColor: '#3a78ff', backgroundColor: gradBlue, 
                    borderWidth: 3, pointBackgroundColor: '#3a78ff',
                    pointBorderColor: '#fff', pointBorderWidth: 1,
                    pointRadius: 0, pointHoverRadius: 5,
                    tension: 0.4, fill: true
                },
                { 
                    label: 'Non-billable', data: data.nonBillable, 
                    borderColor: '#00f0ff', backgroundColor: gradCyan, 
                    borderWidth: 3, pointBackgroundColor: '#00f0ff',
                    pointBorderColor: '#fff', pointBorderWidth: 1,
                    pointRadius: 0, pointHoverRadius: 5,
                    tension: 0.4, fill: true
                }
            ]
        },
        options: {
            ...commonOptions,
            scales: { 
                 ...commonOptions.scales, 
                 y: { ...commonOptions.scales.y, max: Math.max(...data.billable, 10) + 20 } 
            }
        }
    });

    ticketChart = new Chart(document.getElementById('ticketChart'), {
        type: 'bar',
        data: {
            labels: clientPeriodData.labels,
            datasets: [
                { 
                    label: 'Worked', data: data.worked, 
                    backgroundColor: '#1d2a4d', 
                    hoverBackgroundColor: '#2a3a6a',
                    borderRadius: 6, barThickness: 16,
                    xAxisID: 'x'
                },
                { 
                    label: 'Closed', data: data.closed, 
                    backgroundColor: '#00f0ff', 
                    hoverBackgroundColor: '#66f5ff',
                    borderRadius: 6, barThickness: 8,
                    xAxisID: 'x2'
                }
            ]
        },
        options: {
            ...commonOptions,
            scales: {
                ...commonOptions.scales,
                x2: { display: false, grid: { display: false } }
            }
        }
    });

    const neonColors = ['#0ea5e9','#8b5cf6','#10b981','#f59e0b','#f43f5e','#6366f1'];

    if (clientPeriodData && clientPeriodData.engineers) {
        engineerTrendChart = new Chart(document.getElementById('engineerTrendChart'), {
            type: 'line',
            data: {
                labels: clientPeriodData.labels,
                datasets: Object.keys(clientPeriodData.engineers).map((name, i) => ({
                    label: name,
                    data: clientPeriodData.engineers[name].trend,
                    borderColor: neonColors[i % neonColors.length],
                    backgroundColor: 'transparent',
                    borderWidth: currentEngineer && currentEngineer !== name ? 1 : 2,
                    borderDash: currentEngineer && currentEngineer !== name ? [5, 5] : [],
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    tension: 0.3
                }))
            },
            options: commonOptions
        });
    }
}

// Ensure the functions run once auth and setup complete
window.onload = () => {
    // Left empty since onSnapshot handles data loading
};
</script>
