<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MetricSpark Manager Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
display:flex;
height:100vh;
background: radial-gradient(circle at top left,#0f172a,#1e3a8a,#020617);
color:white;
}

.sidebar{
width:260px;
padding:20px;
background: rgba(255,255,255,0.05);
border-right:1px solid rgba(255,255,255,0.1);
}

.engineer{
padding:12px;
margin-bottom:10px;
border-radius:10px;
background: rgba(255,255,255,0.08);
cursor:pointer;
}

.main{ flex:1; padding:25px; overflow:auto; }

.chart-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.chart-card{
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.08);
text-align:center;
}

canvas{
max-width:220px !important;
max-height:220px !important;
margin:auto;
}

.target-box{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.target-card{
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.08);
text-align:center;
}

.good{border:1px solid #22c55e;}
.warn{border:1px solid #f59e0b;}
.bad{border:1px solid #ef4444;}

.trend-box{
margin-top:25px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,0.08);
}

.trend-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

#aiInsights{
margin-top:20px;
}

/* Logout */
#logoutBtn{
position:fixed;
bottom:20px;
right:20px;
background:#ef4444;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
z-index:9999;
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyANWlsjTqHVeaCBBrOH8LJ-cMygCZoIhYc",
authDomain:"metricspark-1456b.firebaseapp.com",
projectId:"metricspark-1456b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let globalData=[], filteredData=[], viewMode="daily";

function num(v){
return isNaN(parseFloat(v)) ? 0 : parseFloat(v);
}

/* AUTH */
firebase.auth().onAuthStateChanged(async(user)=>{
if(!user) return window.location.href="index.html";
const doc=await db.collection("users").doc(user.uid).get();
if(doc.data().role!=="manager") return window.location.href="index.html";
startRealtime();
});

/* REALTIME */
function startRealtime(){
db.collection("worklog").onSnapshot((snap)=>{
globalData=[];
snap.forEach(d=>globalData.push(d.data()));
applyFilter();
});
}

/* DATE FIX */
function getLocalDate(d){
let tzOffset = d.getTimezoneOffset() * 60000;
let local = new Date(d.getTime() - tzOffset);
return local.toISOString().split("T")[0];
}

/* FILTER */
function applyFilter(){

const todayStr = getLocalDate(new Date());

let startDate, endDate;

if(viewMode === "daily"){
startDate = todayStr;
endDate = todayStr;
}else{
let d = new Date();
d.setDate(d.getDate()-6);
startDate = getLocalDate(d);
endDate = todayStr;
}

const s=document.getElementById("startDate").value;
const e=document.getElementById("endDate").value;

filteredData = globalData.filter(d=>{

if(!d.date) return false;

let recordDate = d.date.trim().substring(0,10);

if(s && e){
return recordDate >= s && recordDate <= e;
}

return recordDate >= startDate && recordDate <= endDate;
});

renderSidebar();
renderTeam();
}

/* ✅ FIXED SIDEBAR */
function renderSidebar(){
let map={};

globalData.forEach(d=>{
if(d.engineerName){
map[d.engineerName]=true;
}
});

let html="<h3>Engineers</h3>";
html+=`<div class="engineer" onclick="renderTeam()">👥 Team</div>`;

for(let n in map){
html+=`<div class="engineer" onclick="showEngineer('${n}')">${n}</div>`;
}

document.getElementById("sidebar").innerHTML=html;
}

/* AGGREGATE */
function aggregate(data){
return {
bill:data.reduce((a,b)=>a+num(b.billable),0),
non:data.reduce((a,b)=>a+num(b.nonbillable),0),
tickets:data.reduce((a,b)=>a+num(b.tickets),0),
closed:data.reduce((a,b)=>a+num(b.closed),0),
esc:data.reduce((a,b)=>a+num(b.escalated),0),
sch:data.reduce((a,b)=>a+num(b.scheduled),0)
};
}

/* PIE FIX */
function createPie(id, labels, data){
data=data.map(x=>Math.round(x));

return new Chart(document.getElementById(id),{
type:"pie",
data:{labels,datasets:[{data}]},
plugins:[ChartDataLabels],
options:{
plugins:{
legend:{labels:{color:"white"}},
datalabels:{
color:"#fff",
formatter:(v)=> v
}
}
}
});
}

/* TEAM */
function renderTeam(){
let d=aggregate(filteredData);

document.getElementById("charts").innerHTML=`
<h2>👥 Team (${viewMode})</h2>
<button onclick="setView('daily')">Daily</button>
<button onclick="setView('weekly')">Weekly</button>

<div class="chart-grid">
<div class="chart-card"><h4>Billable vs Non</h4><canvas id="t1"></canvas></div>
<div class="chart-card"><h4>Utilization</h4><canvas id="t2"></canvas></div>
<div class="chart-card"><h4>Worked vs Closed</h4><canvas id="t3"></canvas></div>
<div class="chart-card"><h4>Esc vs Sch</h4><canvas id="t4"></canvas></div>
</div>

<div class="target-box" id="targets"></div>
<div id="individual"></div>

<div class="trend-box">
<h3>📈 Trends & Weekly Comparison</h3>
<div class="trend-grid">
<canvas id="trendBill"></canvas>
<canvas id="trendTickets"></canvas>
<canvas id="trendUtil"></canvas>
</div>
<div id="aiInsights"></div>
</div>
`;

createPie("t1",["Billable","Non"],[d.bill,d.non]);
createPie("t2",["Utilized","Remaining"],[d.bill,(d.bill+d.non)-d.bill]);
createPie("t3",["Worked","Closed"],[d.tickets,d.closed]);
createPie("t4",["Esc","Sch"],[d.esc,d.sch]);

renderTargets(filteredData);
renderTrends();
}

/* VIEW */
function setView(v){
viewMode=v;
applyFilter();
}

/* INDIVIDUAL */
function showEngineer(name){
let data=filteredData.filter(d=>d.engineerName===name);
let d=aggregate(data);

document.getElementById("individual").innerHTML=`
<h2>${name}</h2>
<div class="chart-grid">
<div class="chart-card"><canvas id="c1"></canvas></div>
<div class="chart-card"><canvas id="c2"></canvas></div>
<div class="chart-card"><canvas id="c3"></canvas></div>
<div class="chart-card"><canvas id="c4"></canvas></div>
</div>
`;

createPie("c1",["Bill","Non"],[d.bill,d.non]);
createPie("c2",["Util","Remain"],[d.bill,(d.bill+d.non)-d.bill]);
createPie("c3",["Worked","Closed"],[d.tickets,d.closed]);
createPie("c4",["Esc","Sch"],[d.esc,d.sch]);

renderTargets(data);
}

/* LOGOUT */
function logout(){
firebase.auth().signOut().then(()=>{
window.location.href="index.html";
}).catch(()=>{
window.location.href="index.html";
});
}
</script>

</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
<input type="date" id="startDate">
<input type="date" id="endDate">
<button onclick="applyFilter()">Apply</button>
<div id="charts"></div>
</div>

<div id="logoutBtn" onclick="logout()">🚪 Logout</div>

</body>
</html>
